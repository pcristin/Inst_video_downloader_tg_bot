services:
  instagram-video-bot:
    build: .
    container_name: instagram-video-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount temp directory for video downloads
      - ./temp:/app/temp
      # Mount sessions directory to persist instagrapi sessions
      - ./sessions:/app/sessions
      # Mount logs directory (optional)
      - ./logs:/app/logs
      # Mount accounts file for multi-account support
      - ./accounts.txt:/app/accounts.txt
      # Mount accounts state file to persist banned/usage status
      - ./accounts_state.json:/app/accounts_state.json
    secrets:
      - source: instagram_auth
        target: instagram_auth.json
        uid: "1000"
        gid: "1000"
        mode: 0400
    environment:
      # Override paths to use container paths
      - TEMP_DIR=/app/temp
      # Optional, when the read-only mount above is enabled:
      - IG_AUTH_COOKIES_FILE=/run/secrets/instagram_auth.json
      # Additional environment variables for container
      - TZ=UTC
    # Health check
    healthcheck:
      test: ["CMD", "uv", "run", "--no-sync", "python", "-m", "src.instagram_video_bot.utils.health_check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s 

secrets:
  instagram_auth:
    file: ./secrets/instagram_auth.json
